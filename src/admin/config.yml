backend:
  name: github
  repo: zauster90/STUDIO
  branch: main
  base_url: https://sveltia-cms-auth.zauster-art.workers.dev

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "works"
    label: "Works"
    folder: "src/content/works"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["title", "year", "category", "order"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - { label: "Display Order", name: "order", widget: "number", value_type: "int", default: 100, hint: "Lower numbers appear first within each category. Use this to control the display order on your website." }
      - { label: "Medium", name: "medium", widget: "string" }
      - { label: "Dimensions", name: "dimensions", widget: "string", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Painting", value: "painting" }
          - { label: "Drawing & Print", value: "drawing" }
          - { label: "New Media", value: "new-media" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Video File URL", name: "video_file", widget: "string", required: false, hint: "Paste the full R2 video URL" }
      - { label: "Video Embed URL", name: "video_embed", widget: "string", required: false, hint: "Paste a Vimeo or YouTube embed URL" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Statement", name: "body", widget: "markdown", required: false }

  - name: "posts"
    label: "Blog Posts"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["title", "date"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - { label: "Body", name: "body", widget: "markdown" }
